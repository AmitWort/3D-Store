<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ניהול חנות - 3D Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="index.html">
      <img src="images/logo.png" alt="3D Store" class="site-logo" onerror="this.style.display='none'" />
      <span>3D Store <small>ניהול</small></span>
    </a>
  </header>

  <main>
    <section id="login-section" class="form-card hidden">
      <h2>כניסת בעל החנות</h2>
      <form id="login-form">
        <div class="form-field">
          <label for="admin-password">סיסמה</label>
          <input type="password" id="admin-password" name="password" required />
        </div>
        <div id="login-message" class="message hidden"></div>
        <button type="submit" class="btn btn-primary">התחברות</button>
      </form>
    </section>

    <section id="panel-section" class="admin-section hidden">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>ניהול מוצרים</h2>
        <button type="button" id="logout-btn" class="btn btn-outline">התנתקות</button>
      </div>

      <div class="form-card">
        <h3>הוספת מוצר חדש</h3>
        <form id="add-product-form">
          <div class="form-field">
            <label for="product-name">שם המוצר</label>
            <input type="text" id="product-name" name="name" required />
          </div>
          <div class="form-field">
            <label for="product-price">מחיר (₪)</label>
            <input type="number" id="product-price" name="price" min="0.01" step="0.01" required />
          </div>
          <div class="form-field">
            <label for="product-image">תמונה</label>
            <input type="file" id="product-image" name="image" accept="image/*" required />
          </div>
          <div id="add-product-message" class="message hidden"></div>
          <button type="submit" class="btn btn-primary">הוסף מוצר לגלריה</button>
        </form>
      </div>

      <h3>מוצרים קיימים</h3>
      <div id="admin-product-list"></div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
